<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Curl House Cleaning</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; background: #f8f9fa; min-height: 100vh; display: flex; flex-direction: column; }
        header { background: #2ecc71; padding: 1rem 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .logo { color: white; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .thank-you { background: white; padding: 3rem; border-radius: 16px; text-align: center; max-width: 500px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .checkmark { width: 80px; height: 80px; background: #2ecc71; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem; font-size: 2.5rem; color: white; }
        h1 { color: #2ecc71; margin-bottom: 1rem; }
        p { color: #555; margin-bottom: 1rem; }
        .contact { background: #f8f9fa; padding: 1.5rem; border-radius: 8px; margin: 1.5rem 0; }
        .contact a { color: #2ecc71; font-size: 1.3rem; font-weight: bold; text-decoration: none; }
        .back-link { display: inline-block; background: #2ecc71; color: white; padding: 1rem 2rem; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 1rem; }
        footer { background: #1a1a2e; color: #888; padding: 1.5rem 0; text-align: center; }
    </style>
</head>
<body>
    <header><div class="container"><a href="index.html" class="logo">Curl Cleaning</a></div></header>
    <main>
        <div class="thank-you">
            <div class="checkmark">✓</div>
            <h1>Thank You!</h1>
            <p>Your quote request has been received. We respond to 90% of quotes within 1 hour during business hours.</p>
            <div class="contact">
                <p>Need faster response? Call or text:</p>
                <a href="tel:+16233350962">📞 623-335-0962</a>
            </div>
            <a href="index.html" class="back-link">← Back to Home</a>
        </div>
    </main>
    <footer><p>© 2026 Curl House Cleaning</p></footer>
</body>
</html>
