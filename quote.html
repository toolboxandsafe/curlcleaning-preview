<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get a Quote | Curl House Cleaning</title>
    <meta name="description" content="Request a free house cleaning quote. We respond to 90% of quotes within 1 hour. Call 623-335-0962.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 800px; margin: 0 auto; padding: 0 20px; }
        header { background: #2ecc71; color: white; padding: 1rem 0; }
        header .container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; }
        .logo { font-size: 1.5rem; font-weight: bold; text-decoration: none; color: white; }
        .hero { background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); color: white; padding: 3rem 0; text-align: center; }
        .hero h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .hero p { opacity: 0.9; }
        .form-section { padding: 3rem 0; }
        .form-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 1rem; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #2ecc71; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
        .submit-btn { background: #2ecc71; color: white; padding: 1rem 2rem; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; }
        .submit-btn:hover { background: #27ae60; }
        .response-time { background: #e8f5e9; padding: 1rem; border-radius: 8px; text-align: center; margin-bottom: 2rem; }
        .response-time strong { color: #2ecc71; }
        .phone-cta { text-align: center; margin-top: 2rem; padding: 2rem; background: #f8f9fa; border-radius: 8px; }
        .phone-cta a { color: #2ecc71; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        footer { background: #1a1a2e; color: white; padding: 2rem 0; text-align: center; margin-top: 3rem; }
        footer a { color: #2ecc71; }
    </style>
</head>
<body>
    <header>
        <div class="container" style="max-width: 1200px;">
            <a href="index.html" class="logo">Curl Cleaning</a>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>Get a Free Quote</h1>
            <p>We respond to 90% of quotes within 1 hour (during business hours)</p>
        </div>
    </section>

    <section class="form-section">
        <div class="container">
            <div class="response-time">
                <strong>⚡ Fast Response:</strong> Most quotes answered within 1 hour!
            </div>
            
            <div class="form-card">
                <form action="thanks.html" method="GET">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="name">Your Name *</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number *</label>
                            <input type="tel" id="phone" name="phone" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email">
                    </div>
                    
                    <div class="form-group">
                        <label for="address">Property Address *</label>
                        <input type="text" id="address" name="address" placeholder="Street, City, ZIP" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="service">Service Type *</label>
                            <select id="service" name="service" required>
                                <option value="">Select a service...</option>
                                <option value="routine">Routine Cleaning</option>
                                <option value="deep">Deep/Spring Cleaning</option>
                                <option value="movein">Move In Cleaning</option>
                                <option value="moveout">Move Out Cleaning</option>
                                <option value="commercial">Commercial Cleaning</option>
                                <option value="vacation">Vacation Rental</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="bedrooms">Bedrooms</label>
                            <select id="bedrooms" name="bedrooms">
                                <option value="1">1 Bedroom</option>
                                <option value="2">2 Bedrooms</option>
                                <option value="3" selected>3 Bedrooms</option>
                                <option value="4">4 Bedrooms</option>
                                <option value="5">5+ Bedrooms</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="bathrooms">Bathrooms</label>
                            <select id="bathrooms" name="bathrooms">
                                <option value="1">1 Bathroom</option>
                                <option value="2" selected>2 Bathrooms</option>
                                <option value="3">3 Bathrooms</option>
                                <option value="4">4+ Bathrooms</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="sqft">Approx. Square Feet</label>
                            <input type="text" id="sqft" name="sqft" placeholder="e.g., 2000">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="frequency">Cleaning Frequency (for routine)</label>
                        <select id="frequency" name="frequency">
                            <option value="onetime">One-Time</option>
                            <option value="weekly">Weekly</option>
                            <option value="biweekly">Every Other Week</option>
                            <option value="monthly">Monthly</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="details">Additional Details</label>
                        <textarea id="details" name="details" rows="4" placeholder="Pets? Special requests? Anything else we should know?"></textarea>
                    </div>
                    
                    <button type="submit" class="submit-btn">Request My Free Quote →</button>
                </form>
            </div>
            
            <div class="phone-cta">
                <p>Prefer to call?</p>
                <a href="tel:+16233350962">📞 623-335-0962</a>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>© 2026 Curl House Cleaning | <a href="index.html">Home</a></p>
        </div>
    </footer>
</body>
</html>
